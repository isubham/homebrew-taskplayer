name: Compatibility

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  app-contracts:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - run: npm ci
      - name: Reject destructive backend migrations
        run: npm run check:compatibility
      - name: Verify release notes for the current version
        run: npm run check:release-notes
      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - name: Test local database upgrades
        run: cargo test --manifest-path src-tauri/core/Cargo.toml
      - name: Test old and current sync payloads
        run: cargo test --manifest-path src-tauri/Cargo.toml

  supabase-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Start local Supabase
        run: npx supabase start -x studio,imgproxy,edge-runtime,logflare,vector,supavisor
      - name: Test old-client writes against the current schema
        run: npx supabase test db
